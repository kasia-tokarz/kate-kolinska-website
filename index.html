<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kate Kolinska | Personal Stylist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">kate kolinska</div>
            <nav class="main-nav">
                <ul>
                    <li><a href="#">główna</a></li>
                    <li><a href="#">o mnie</a></li>
                    <li><a href="#">oferta</a></li>
                    <li><a href="#">kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <img src="tlo.jpg" class="hero-bg-image" alt="Tło">
        
        <img src="ty.png" class="hero-main-image" alt="Kate Kolinska">
        
        <div class="hero-content">
            <h1 class="hero-logo">kate kolinska</h1>
            <p class="hero-subtitle">STYLST</p>
        </div>
    </section>

    <section class="welcome">
        <div class="welcome-container">
            <div class="vertical-divider"></div>
            <p class="welcome-quote">"style is a way to say who you are without saying anything"</p>
            <p class="welcome-text-small">dress in your own personality with</p>
            <p class="welcome-name-cursive">Kate Kolinska</p>
        </div>
    </section>

</body>
</html>
